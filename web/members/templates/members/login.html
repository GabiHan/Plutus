{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %} 
    <link href="{% static 'src/main.css' %}" rel="stylesheet">
    <title>Register</title>
</head>
<style>
/* =========================
   FULL PAGE CONTAINER
========================= */
.login-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 98vh;
    font-family: 'Open Sans', sans-serif;
}

/* LEFT IMAGE */
.login-container .left {
    position: relative;
    background: url("{% static 'src/1.jpg' %}") center/cover no-repeat;
    overflow: hidden;
}

.login-container .left::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3); /* subtle overlay */
}

.login-container .left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 1.5s ease;
}

.login-container .left:hover img {
    transform: scale(1.05); /* gentle zoom on hover */
}

/* RIGHT FORM */
.login-container .right {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #acaaaa;
    color: white;
    padding: 3rem;
}

/* FORM STYLING */
.login-container form {
    border: 2px solid #000000;
    width: 100%;
    max-width: 400px;
    background-color: rgba(253, 255, 160, 0.2);
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.login-container form h1 {
    color: #2e2e2e;
    font-weight: bold;
    display: block;
    margin-bottom: 0.5rem;
    font-size: 14px;
}

.login-container form input[type="text"],
.login-container form input[type="password"] {
    width: 95%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #000000;
    border-radius: 8px;
    background: #ffffff;
    color: #fff;
    font-size: 14px;
}

.login-container form input::placeholder {
    color: #aaa;
    opacity: 1;
}

.login-container form input[type="submit"] {
    width: 100%;
    padding: 14px;
    background-color: #000000;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.login-container form input[type="submit"]:hover {
    background-color: #ffffff;
    color: #000000;
}

/* ERROR MESSAGE */
.login-container p {
    color: #ff6b6b;
    text-align: center;
    margin-bottom: 1rem;
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .login-container {
        grid-template-columns: 1fr;
    }

    .login-container .left,
    .login-container .right {
        width: 100%;
        min-height: 40vh;
    }

    .login-container .right {
        padding: 2rem 1rem;
    }
}
    </style>
<body>
<div class="login-container">
    <div class="left">
        <img src="{% static 'src/1.jpg' %}" alt="Login Image">
    </div>
    <div class="right">
        <form method="post" action="{% url 'login_view' %}">
            {% csrf_token %}
            <h1>Login</h1>
            {% if error %}
                <p>{{ error }}</p>
            {% endif %}
            <input type="text" name="login" placeholder="Enter your login">
            <h1>Password</h1>
            <input type="password" name="password" placeholder="Enter your password">
            <input type="submit" value="Login">
        </form>
    </div>
</div>
</body>
</html>
{% endblock %}
